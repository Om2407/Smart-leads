version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: smart-leads-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - smart-leads-net

  backend:
    build: ./backend
    container_name: smart-leads-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    networks:
      - smart-leads-net
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: smart-leads-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - smart-leads-net
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:

networks:
  smart-leads-net:
    driver: bridge
